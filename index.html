<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1 style="font-family:'Georgia'">Water Quest</h1>
    <p class="game-instructions" style="font-family:'Georgia'">Collect 20 items to complete the game!</p>
    <div class="stats">
      <p style="font-family:'Georgia'">Cans Collected: <span id="current-cans">0</span></p>
      <p style="font-family:'Georgia'">Time Left: <span id="timer">30</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <div id="start-game">
      <button id="Easy-game" style="font-family:'Georgia'">Easy</button>
      <button id="Intermediate-game" style="font-family:'Georgia'">Intermediate</button>
      <button id="Hard-game" style="font-family:'Georgia'">Hard</button>
    </div>
  </div>

  <footer>
    <div class="footerlink">
      <a href="https://www.charitywater.org/" style="font-family:'Georgia'">Support Charity: Water here!</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
